<!DOCTYPE html>
<html>
    <head>
        <title>Mobile App Dashboard</title>
    
        </head>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing: border-box;
            }
            body{
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                display:flex;
                justify-content: center;
                align-items:center ;
                height:100vh;
                background-color: aliceblue;
            }
            .dashboard{
                margin-bottom: 20px;
                color:#333;
            }

            .grid-container{
                display:grid;
                grid-template-columns: repeat(2,150px);
                grid-template-rows: repeat(3,120px);
                gap:20px;
            }
            .box{
                background-color: #4CAF50;
                color:white;
                border-radius:10px ;
                font-size:35px;
                font-weight:bold ;
                display:flex;
                justify-content: center;
                align-items: center;
                flex-direction:column ;
                transition:0.3s;
                cursor:pointer;
                gap:500px;
            }

        </style>
        <body>
            <div class="Dashboard">
                <h1>My Dashboard</h1>
            </div>
            <div class="grid-container">
            <div class="box">profile<div>
                <div class="box">wallet</div>
                <div class="box">Settings</div>
                <div class="box">Message</div>
                <div class="box">Gallary</div>
                <div class="box">Layout</div>
                </div>
        </body>
        <html>
